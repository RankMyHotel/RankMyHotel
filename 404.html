<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>RankMyHotel.net</title>
  <!-- Instant client-side redirect to homepage. The meta refresh fires for
       any user-agent that respects HTML, including most bots and crawlers.
       The JS line is a backup in case the browser is slow on meta refresh. -->
  <meta http-equiv="refresh" content="0; url=https://rankmyhotel.net/">
  <link rel="canonical" href="https://rankmyhotel.net/">
  <script>window.location.replace("https://rankmyhotel.net/");</script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           text-align: center; padding: 60px 20px; color: #3d3d3d; }
    a { color: #d72027; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <p>Redirecting to <a href="https://rankmyhotel.net/">rankmyhotel.net</a>…</p>
</body>
</html>
